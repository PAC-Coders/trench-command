name: Build (macOS & Windows — Godot 4.4.1)

on:
  push:
  pull_request:
  workflow_dispatch: {}

env:
  GODOT_VERSION: "4.4.1-stable"
  GODOT_TEMPLATES_DIR: "4.4.1.stable"
  GODOT_USER_HOME: ${{ github.workspace }}/.godot_home   # стабільний шлях для кешу

jobs:
  # ---------------- MACOS ----------------
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure folders
        run: |
          set -euo pipefail
          mkdir -p Tools
          mkdir -p "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"
          DEFAULT_DIR="$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR"
          mkdir -p "$DEFAULT_DIR"

      # ---------- КЕШ РЕДАКТОРА ----------
      - name: Cache Godot editor
        id: cache-editor
        uses: actions/cache@v4
        with:
          path: Tools
          key: godot-editor-macos-4.4.1

      - name: Download Godot (editor) from GitHub Releases (with retry)
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/godot_mac.zip"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          echo "Downloading editor: $URL"
          curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
               --connect-timeout 20 --max-time 600 "$URL" -o "$OUT"
          unzip -q "$OUT" -d Tools
          GODOT_APP=$(find Tools -name "Godot*.app" -maxdepth 2 | head -n1)
          if [ -z "$GODOT_APP" ]; then echo "Godot.app not found"; exit 1; fi
          echo "GODOT_BIN=$GODOT_APP/Contents/MacOS/Godot" >> $GITHUB_ENV
          chmod +x "$GODOT_APP/Contents/MacOS/Godot"

      - name: Locate Godot (when restored from cache)
        if: steps.cache-editor.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          GODOT_APP=$(find Tools -name "Godot*.app" -maxdepth 2 | head -n1)
          if [ -z "$GODOT_APP" ]; then echo "Godot.app not found in cache"; exit 1; fi
          echo "GODOT_BIN=$GODOT_APP/Contents/MacOS/Godot" >> $GITHUB_ENV
          chmod +x "$GODOT_APP/Contents/MacOS/Godot"

      # ---------- КЕШ ШАБЛОНІВ (у власній теці) ----------
      - name: Cache export templates (custom dir)
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ${{ env.GODOT_USER_HOME }}/templates/${{ env.GODOT_TEMPLATES_DIR }}
          key: godot-templates-4.4.1

      - name: Install export templates from GitHub Releases (flat unzip of macos.zip)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/templates.tpz"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "Downloading templates: $URL"
          curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
               --connect-timeout 20 --max-time 1200 "$URL" -o "$OUT"

          # ПЛОСКО витягаємо рівно файлик templates/macos.zip у нашу кешовану теку:
          unzip -q -j "$OUT" "templates/macos.zip" -d "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

          # Перевіряємо наявність macOS-шаблону:
          test -f "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR/macos.zip" \
            || { echo "macos.zip not found in GODOT_USER_HOME"; ls -la "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"; exit 1; }

      # Симлінк дефолтної editor-текі на нашу кешовану (щоб Godot точно знайшов шаблони)
      - name: Link default editor dir to cached templates
        run: |
          set -euo pipefail
          DEFAULT_DIR="$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR"
          mkdir -p "$(dirname "$DEFAULT_DIR")"
          rm -rf "$DEFAULT_DIR"
          ln -s "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR" "$DEFAULT_DIR"

      - name: Debug templates location
        run: |
          set -euo pipefail
          echo "HOME=$HOME"
          echo "GODOT_USER_HOME=$GODOT_USER_HOME"
          echo "Godot version:"
          "$GODOT_BIN" --headless --version
          echo "Default templates dir (should be symlink):"
          ls -la "$HOME/Library/Application Support/Godot/export_templates"
          ls -la "$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR" || true
          echo "Custom templates dir listing:"
          ls -la "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

      - name: Build macOS
        env:
          GODOT_BIN: ${{ env.GODOT_BIN }}
          GODOT_USER_HOME: ${{ env.GODOT_USER_HOME }}
        run: |
          set -euo pipefail
          bash Tools/build_mac.sh

      - name: Verify build outputs
        run: |
          set -euo pipefail
          test -f build/TrenchCommand_mac.zip || { echo "Missing build/TrenchCommand_mac.zip"; exit 1; }
          unzip -l build/TrenchCommand_mac.zip | head -n 20

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: TrenchCommand-macOS
          path: |
            build/TrenchCommand_mac.zip
            build/TrenchCommand_mac.app
          if-no-files-found: ignore

      - name: Job summary
        run: |
          echo "### Build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Godot: $("${GODOT_BIN}" --headless --version)" >> $GITHUB_STEP_SUMMARY
          echo "- Default templates (symlink): $HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- Custom templates:            $GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- Outputs: build/TrenchCommand_mac.zip, build/TrenchCommand_mac.app" >> $GITHUB_STEP_SUMMARY


    # ---------------- WINDOWS ----------------
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure folders
        run: |
          mkdir Tools -Force
          mkdir "%GITHUB_WORKSPACE%\.godot_home\templates\%GODOT_TEMPLATES_DIR%"

      # ---------- Кэш редактора ----------
      - name: Cache Godot editor
        id: cache-editor-windows
        uses: actions/cache@v4
        with:
          path: Tools
          key: godot-editor-windows-4.4.1

      - name: Download Godot (editor)
        if: steps.cache-editor-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $out = "$env:TEMP\godot_win.zip"
          $url = "https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_win64.exe.zip"
          Write-Host "Downloading editor: $url"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Expand-Archive -Path $out -DestinationPath Tools
          $godot_bin = Get-ChildItem Tools -Filter "Godot*.exe" -Recurse | Select-Object -First 1
          if (-not $godot_bin) { Write-Error "Godot.exe not found"; exit 1 }
          Write-Host "GODOT_BIN=$($godot_bin.FullName)"
          echo "GODOT_BIN=$($godot_bin.FullName)" >> $env:GITHUB_ENV

      # ---------- Кэш шаблонів ----------
      - name: Cache export templates
        id: cache-templates-windows
        uses: actions/cache@v4
        with:
          path: ${{ env.GODOT_USER_HOME }}\templates\${{ env.GODOT_TEMPLATES_DIR }}
          key: godot-templates-windows-4.4.1

      - name: Install export templates
        if: steps.cache-templates-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $out = "$env:TEMP\templates.tpz"
          $url = "https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz"
          Write-Host "Downloading templates: $url"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          # Extract only templates/windows_64.zip to the target directory
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($out)
          foreach ($entry in $zip.Entries) {
            if ($entry.FullName -eq "templates/windows_64.zip") {
              $target = "$env:GITHUB_WORKSPACE\.godot_home\templates\$env:GODOT_TEMPLATES_DIR\windows_64.zip"
              $entry.ExtractToFile($target, $true)
            }
          }
          $zip.Dispose()
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\.godot_home\templates\$env:GODOT_TEMPLATES_DIR\windows_64.zip")) {
              Write-Error "windows_64.zip not found in GODOT_USER_HOME"
              exit 1
          }

      # ---------- Симлинк дефолтної директории шаблонів ----------
      - name: Link default editor dir to cached templates
        shell: pwsh
        run: |
          $default_dir="$env:APPDATA\Godot\export_templates\$env:GODOT_TEMPLATES_DIR"
          Remove-Item -Recurse -Force $default_dir -ErrorAction SilentlyContinue
          New-Item -ItemType SymbolicLink -Path $default_dir -Target "$env:GITHUB_WORKSPACE\.godot_home\templates\$env:GODOT_TEMPLATES_DIR"

      # ---------- Отладка ----------
      - name: Debug templates location
        shell: pwsh
        run: |
          Write-Host "GODOT_USER_HOME=$env:GODOT_USER_HOME"
          & $env:GODOT_BIN --headless --version
          dir "$env:APPDATA\Godot\export_templates\$env:GODOT_TEMPLATES_DIR"

      # ---------- Сборка ----------
      - name: Build Windows
        shell: pwsh
        env:
          GODOT_BIN: ${{ env.GODOT_BIN }}
          GODOT_USER_HOME: ${{ env.GODOT_USER_HOME }}
        run: Tools\build_win.ps1

      # ---------- Проверка сборки ----------
      - name: Verify build outputs
        shell: pwsh
        run: |
          if (-not (Test-Path build\TrenchCommand_win.exe)) { Write-Error "Missing build\TrenchCommand_win.exe"; exit 1 }
          if (-not (Test-Path build\TrenchCommand_win.zip)) { Write-Error "Missing build\TrenchCommand_win.zip"; exit 1 }
          tar -tf build\TrenchCommand_win.zip | Select-Object -First 20

      # ---------- Загрузка артефакта ----------
      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: TrenchCommand-Windows
          path: |
            build/TrenchCommand_win.zip
            build/TrenchCommand_win.exe
          if-no-files-found: ignore

      - name: Job summary
        shell: pwsh
        run: |
          echo "### Build summary" >> $env:GITHUB_STEP_SUMMARY
          echo "- Godot: $($env:GODOT_BIN) --headless --version" >> $env:GITHUB_STEP_SUMMARY
          echo "- Default templates (symlink): $env:APPDATA\Godot\export_templates\$env:GODOT_TEMPLATES_DIR" >> $env:GITHUB_STEP_SUMMARY
          echo "- Custom templates: $env:GODOT_USER_HOME\templates\$env:GODOT_TEMPLATES_DIR" >> $env:GITHUB_STEP_SUMMARY
          echo "- Outputs: build/TrenchCommand_win.zip, build/TrenchCommand_win.exe" >> $env:GITHUB_STEP_SUMMARY


