name: Build (macOS, Godot 4.4.1)
on: [push, pull_request, workflow_dispatch]

env:
  GODOT_VERSION: "4.4.1-stable"
  GODOT_TEMPLATES_DIR: "4.4.1.stable"
  GODOT_USER_HOME: ${{ github.workspace }}/.godot_home

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure folders
        run: |
          mkdir -p Tools
          mkdir -p "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

      - name: Cache Godot editor
        id: cache-editor
        uses: actions/cache@v4
        with:
          path: Tools
          key: godot-editor-macos-4.4.1

      - name: Download Godot (editor) with mirrors + retry
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          BASE="${GODOT_VERSION/-stable/}"  # 4.4.1
          OUT="$RUNNER_TEMP/godot_mac.zip"
          URLS=(
            "https://downloads.tuxfamily.org/godotengine/$BASE/Godot_v${GODOT_VERSION}_macos.universal.zip"
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          )
          for u in "${URLS[@]}"; do
            echo "Trying $u"
            if curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
                   --connect-timeout 20 --max-time 600 "$u" -o "$OUT"; then
              echo "Downloaded from $u"
              break
            fi
          done
          test -f "$OUT" || { echo "Failed to download Godot editor from all mirrors"; exit 1; }
          unzip -q "$OUT" -d Tools
          GODOT_APP=$(find Tools -name "Godot*.app" -maxdepth 2 | head -n1)
          if [ -z "$GODOT_APP" ]; then echo "Godot.app not found"; exit 1; fi
          echo "GODOT_BIN=$GODOT_APP/Contents/MacOS/Godot" >> $GITHUB_ENV
          chmod +x "$GODOT_APP/Contents/MacOS/Godot"

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ${{ env.GODOT_USER_HOME }}/templates/${{ env.GODOT_TEMPLATES_DIR }}
          key: godot-templates-4.4.1

      - name: Install export templates (with mirrors + retry)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          BASE="${GODOT_VERSION/-stable/}"
          OUT="$RUNNER_TEMP/templates.tpz"
          URLS=(
            "https://downloads.tuxfamily.org/godotengine/$BASE/Godot_v${GODOT_VERSION}_export_templates.tpz"
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          )
          for u in "${URLS[@]}"; do
            echo "Trying $u"
            if curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
                   --connect-timeout 20 --max-time 600 "$u" -o "$OUT"; then
              echo "Downloaded from $u"
              break
            fi
          done
          test -f "$OUT" || { echo "Failed to download templates from all mirrors"; exit 1; }
          unzip -q "$OUT" -d "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

      - name: Debug (optional)
        run: |
          echo "GODOT_USER_HOME=$GODOT_USER_HOME"
          "$GODOT_BIN" --headless --version
          ls -la "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

      - name: Build macOS
        env:
          GODOT_BIN: ${{ env.GODOT_BIN }}
          GODOT_USER_HOME: ${{ env.GODOT_USER_HOME }}
        run: bash Tools/build_mac.sh

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: TrenchCommand-macOS
          path: |
            build/TrenchCommand_mac.zip
            build/TrenchCommand_mac.app
          if-no-files-found: ignore
