name: Build (macOS & Windows — Godot 4.4.1)

on:
  push:
  pull_request:
  workflow_dispatch: {}

env:
  GODOT_VERSION: "4.4.1-stable"
  GODOT_TEMPLATES_DIR: "4.4.1.stable"
  GODOT_USER_HOME: ${{ github.workspace }}/.godot_home   # стабільний шлях для кешу

jobs:
  # ---------------- MACOS ----------------
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure folders
        run: |
          set -euo pipefail
          mkdir -p Tools
          mkdir -p "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"
          DEFAULT_DIR="$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR"
          mkdir -p "$DEFAULT_DIR"

      # ---------- КЕШ РЕДАКТОРА ----------
      - name: Cache Godot editor
        id: cache-editor
        uses: actions/cache@v4
        with:
          path: Tools
          key: godot-editor-macos-4.4.1

      - name: Download Godot (editor) from GitHub Releases (with retry)
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/godot_mac.zip"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          echo "Downloading editor: $URL"
          curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
               --connect-timeout 20 --max-time 600 "$URL" -o "$OUT"
          unzip -q "$OUT" -d Tools
          GODOT_APP=$(find Tools -name "Godot*.app" -maxdepth 2 | head -n1)
          if [ -z "$GODOT_APP" ]; then echo "Godot.app not found"; exit 1; fi
          echo "GODOT_BIN=$GODOT_APP/Contents/MacOS/Godot" >> $GITHUB_ENV
          chmod +x "$GODOT_APP/Contents/MacOS/Godot"

      - name: Locate Godot (when restored from cache)
        if: steps.cache-editor.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          GODOT_APP=$(find Tools -name "Godot*.app" -maxdepth 2 | head -n1)
          if [ -z "$GODOT_APP" ]; then echo "Godot.app not found in cache"; exit 1; fi
          echo "GODOT_BIN=$GODOT_APP/Contents/MacOS/Godot" >> $GITHUB_ENV
          chmod +x "$GODOT_APP/Contents/MacOS/Godot"

      # ---------- КЕШ ШАБЛОНІВ (у власній теці) ----------
      - name: Cache export templates (custom dir)
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ${{ env.GODOT_USER_HOME }}/templates/${{ env.GODOT_TEMPLATES_DIR }}
          key: godot-templates-4.4.1

      - name: Install export templates from GitHub Releases (flat unzip of macos.zip)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/templates.tpz"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "Downloading templates: $URL"
          curl -L -f --retry 5 --retry-all-errors --retry-delay 3 \
               --connect-timeout 20 --max-time 1200 "$URL" -o "$OUT"

          # ПЛОСКО витягаємо рівно файлик templates/macos.zip у нашу кешовану теку:
          unzip -q -j "$OUT" "templates/macos.zip" -d "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

          # Перевіряємо наявність macOS-шаблону:
          test -f "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR/macos.zip" \
            || { echo "macos.zip not found in GODOT_USER_HOME"; ls -la "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"; exit 1; }

      # Симлінк дефолтної editor-текі на нашу кешовану (щоб Godot точно знайшов шаблони)
      - name: Link default editor dir to cached templates
        run: |
          set -euo pipefail
          DEFAULT_DIR="$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR"
          mkdir -p "$(dirname "$DEFAULT_DIR")"
          rm -rf "$DEFAULT_DIR"
          ln -s "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR" "$DEFAULT_DIR"

      - name: Debug templates location
        run: |
          set -euo pipefail
          echo "HOME=$HOME"
          echo "GODOT_USER_HOME=$GODOT_USER_HOME"
          echo "Godot version:"
          "$GODOT_BIN" --headless --version
          echo "Default templates dir (should be symlink):"
          ls -la "$HOME/Library/Application Support/Godot/export_templates"
          ls -la "$HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR" || true
          echo "Custom templates dir listing:"
          ls -la "$GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR"

      - name: Build macOS
        env:
          GODOT_BIN: ${{ env.GODOT_BIN }}
          GODOT_USER_HOME: ${{ env.GODOT_USER_HOME }}
        run: |
          set -euo pipefail
          bash Tools/build_mac.sh

      - name: Verify build outputs
        run: |
          set -euo pipefail
          test -f build/TrenchCommand_mac.zip || { echo "Missing build/TrenchCommand_mac.zip"; exit 1; }
          unzip -l build/TrenchCommand_mac.zip | head -n 20

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: TrenchCommand-macOS
          path: |
            build/TrenchCommand_mac.zip
            build/TrenchCommand_mac.app
          if-no-files-found: ignore

      - name: Job summary
        run: |
          echo "### Build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Godot: $("${GODOT_BIN}" --headless --version)" >> $GITHUB_STEP_SUMMARY
          echo "- Default templates (symlink): $HOME/Library/Application Support/Godot/export_templates/$GODOT_TEMPLATES_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- Custom templates:            $GODOT_USER_HOME/templates/$GODOT_TEMPLATES_DIR" >> $GITHUB_STEP_SUMMARY
          echo "- Outputs: build/TrenchCommand_mac.zip, build/TrenchCommand_mac.app" >> $GITHUB_STEP_SUMMARY


  # ---------------- WINDOWS ----------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

       - name: Ensure folders
        run: |
          New-Item -ItemType Directory -Force -Path Tools | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GODOT_USER_HOME\templates\$env:GODOT_TEMPLATES_DIR" | Out-Null

      - name: Cache Godot editor (Windows)
        id: cache-editor
        uses: actions/cache@v4
        with:
          path: Tools
          key: godot-editor-windows-${{ env.GODOT_VERSION }}

      - name: Download Godot (editor) if missing
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: |
          $out="$env:RUNNER_TEMP\godot_win.zip"
          $url="https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_win64.exe.zip"
          Invoke-WebRequest -Uri $url -OutFile $out
          Expand-Archive $out -DestinationPath Tools
          $exe=Get-ChildItem Tools -Recurse -Filter "Godot*.exe" | Select-Object -First 1
          echo "GODOT_BIN=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache export templates (Windows)
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ${{ env.GODOT_USER_HOME }}/templates/${{ env.GODOT_TEMPLATES_DIR }}
          key: godot-templates-${{ env.GODOT_VERSION }}

      - name: Install export templates (Windows)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          $out="$env:RUNNER_TEMP\templates.tpz"
          $url="https://github.com/godotengine/godot/releases/download/${env:GODOT_VERSION}/Godot_v${env:GODOT_VERSION}_export_templates.tpz"
          Invoke-WebRequest -Uri $url -OutFile $out
          Expand-Archive $out -DestinationPath "$env:GODOT_USER_HOME\templates\$env:GODOT_TEMPLATES_DIR"
          # Важливо: потрібен саме windows.zip
          if (-Not (Test-Path "$env:GODOT_USER_HOME\templates\$env:GODOT_TEMPLATES_DIR\windows.zip")) {
            Write-Error "windows.zip template not found"
            exit 1
          }

      - name: Build Windows
        run: pwsh Tools/build_win.ps1
        env:
          GODOT_BIN: ${{ env.GODOT_BIN }}
          GODOT_USER_HOME: ${{ env.GODOT_USER_HOME }}

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: TrenchCommand-Windows
          path: build/TrenchCommand_win.zip

      -  name: Job summary
         shell: pwsh
         run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Build summary"
          $godotVersion = & $env:GODOT_BIN --headless --version
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Godot: $godotVersion"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Templates: $env:GODOT_USER_HOME\templates\$env:GODOT_TEMPLATES_DIR"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Outputs: build/TrenchCommand_win.zip"
